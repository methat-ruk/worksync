name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: worksync_test
          POSTGRES_USER: worksync
          POSTGRES_PASSWORD: worksync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worksync -d worksync_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://worksync:worksync@localhost:5432/worksync_test?schema=public
      TEST_REDIS_URL: redis://localhost:6379/1
      AUTH_RATE_LIMIT_ENABLED: "true"
      AUTH_RATE_LIMIT_KEY_SECRET: ci-rate-limit-secret-at-least-32-bytes
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: pnpm --filter @worksync/backend prisma:migrate:deploy

      - name: Validate backend
        run: pnpm validate:backend

      - name: Validate frontend
        run: pnpm validate:frontend

      - name: Install Playwright browser
        run: pnpm --filter @worksync/frontend exec playwright install --with-deps chromium

      - name: Run frontend end-to-end tests
        run: pnpm --filter @worksync/frontend test:e2e

      - name: Validate infrastructure container topology
        run: docker compose -f docker/compose.yml config --quiet

      - name: Validate full container topology
        env:
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-bytes-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-bytes-different
        run: docker compose -f docker/compose.yml -f docker/compose.app.yml config --quiet

      - name: Validate full container services
        env:
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-bytes-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-bytes-different
        run: |
          services="$(docker compose -f docker/compose.yml -f docker/compose.app.yml config --services | sort | tr '\n' ' ')"
          test "$services" = "backend frontend minio postgres redis "

      - name: Build application images
        run: |
          docker build --target backend -t worksync-backend:ci .
          docker build \
            --target frontend \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:4000 \
            --build-arg NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED=false \
            -t worksync-frontend:ci .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate
